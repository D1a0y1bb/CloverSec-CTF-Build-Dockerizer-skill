challenge:
  name: "rdg-php-hardening-basic"
  stack: "rdg"
  base_image: "php:8.2-apache"
  workdir: "/app"
  app_src: "."
  app_dst: "/app"
  expose_ports:
    - "80"
  start:
    mode: "cmd"
    cmd: "apache2-foreground"
  runtime_deps: []
  build_deps: []
  flag:
    path: "/flag"
    permission: "444"
  platform:
    entrypoint: "/start.sh"
    require_bash: true
  rdg:
    enable_ttyd: true
    ttyd_port: "8022"
    ttyd_login_cmd: "/bin/bash"
  extra:
    env: {}
    copy: []
    user: ""
