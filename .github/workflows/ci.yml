name: CI

on:
  pull_request:
    branches:
      - main
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  fast-check:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Python deps
        run: |
          python3 -m pip install --upgrade pip
          pip3 install -r src/CloverSec-CTF-Build-Dockerizer/scripts/requirements.txt

      - name: Python syntax check
        run: python3 -m py_compile src/CloverSec-CTF-Build-Dockerizer/scripts/*.py

      - name: Shell syntax check
        run: find scripts src/CloverSec-CTF-Build-Dockerizer/scripts -name '*.sh' -print0 | xargs -0 -n1 bash -n

      - name: Validate examples
        run: bash src/CloverSec-CTF-Build-Dockerizer/scripts/validate_examples.sh

      - name: Validate autofix dry-run
        run: |
          EXAMPLE_DIR="src/CloverSec-CTF-Build-Dockerizer/examples/node-basic"
          python3 src/CloverSec-CTF-Build-Dockerizer/scripts/render.py --config "${EXAMPLE_DIR}/challenge.yaml" --output "${EXAMPLE_DIR}"
          bash src/CloverSec-CTF-Build-Dockerizer/scripts/validate.sh --fix "${EXAMPLE_DIR}/Dockerfile" "${EXAMPLE_DIR}/start.sh" "${EXAMPLE_DIR}/challenge.yaml"

      - name: Document guard
        run: bash scripts/doc_guard.sh

      - name: Skill discovery
        run: npx -y skills add . --list

  release-full-check:
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Python deps
        run: |
          python3 -m pip install --upgrade pip
          pip3 install -r src/CloverSec-CTF-Build-Dockerizer/scripts/requirements.txt

      - name: Python syntax check
        run: python3 -m py_compile src/CloverSec-CTF-Build-Dockerizer/scripts/*.py

      - name: Shell syntax check
        run: find scripts src/CloverSec-CTF-Build-Dockerizer/scripts -name '*.sh' -print0 | xargs -0 -n1 bash -n

      - name: Validate examples
        run: VALIDATE_ENFORCE_DIGEST=1 bash src/CloverSec-CTF-Build-Dockerizer/scripts/validate_examples.sh

      - name: Document guard
        run: bash scripts/doc_guard.sh

      - name: Skill discovery
        run: npx -y skills add . --list

      - name: Smoke test
        run: bash src/CloverSec-CTF-Build-Dockerizer/scripts/smoke_test.sh

      - name: Release build
        run: bash scripts/release_build.sh

      - name: Assert SBOM artifacts
        run: |
          version="$(tr -d '[:space:]' < VERSION)"
          test -n "${version}"
          test -f "dist/CloverSec-CTF-Build-Dockerizer-${version}.sbom.spdx.json"
          test -f "dist/CloverSec-CTF-Build-Dockerizer-${version}.sbom.cdx.json"
          test -f "dist/CloverSec-CTF-Build-Dockerizer-${version}.deps.txt"
